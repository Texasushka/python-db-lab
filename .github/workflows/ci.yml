name: First CI

on:
  push:
    branches:
      - main

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build --scale app=2

      - name: Show containers
        run: docker compose ps

      - name: Wait for stack
        run: sleep 10

      - name: Check app through nginx
        run: curl -f localhost:8090/health

      - name: Check readiness through nginx
        run: curl -f localhost:8090/ready

      - name: Show logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop stack
        if: always()
        run: docker compose down -v