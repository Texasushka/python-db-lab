name: First CI

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      DB_HOST: db
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Prepare image name
        id: image-name
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}":${GITHUB_SHA}
          echo "image=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image-name.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    
    outputs:
      image: ${{ steps.image-name.outputs.image }}
  
  integration-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      DB_HOST: db
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN}}
      
      - name: Start stack
        env:
          APP_IMAGE: ${{ needs.build.outputs.image }}
        run: docker compose up -d --scale app=2
      
      - name: Show containers
        run: docker compose ps
      
      - name: Wait for stack
        run: sleep 10
      
      - name: Check jealth through nginx
        run: curl -f localhost:8090/health
      
      - name: Check readiness through nginx
        run: curl -f localhost:8090/ready
      
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
      
      - name: Stop stack
        if: always()
        run: docker compose down -v
