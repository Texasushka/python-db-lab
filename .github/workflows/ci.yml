name: First CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      DB_HOST: db
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: python-db-lab:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
  
  integration-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      POSTGRES_DB: appdb
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      DB_HOST: db
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Start stack
        run: docker compose up -d --build --scale app=2
      
      - name: Show containers
        run: docker compose ps
      
      - name: Wait for stack
        run: sleep 10
      
      - name: Check jealth through nginx
        run: curl -f localhost:8090/health
      
      - name: Check readiness through nginx
        run: curl -f localhost:8090/ready
      
      - name: Show logs on failure
        if: failure()
        run: docker compose logs
      
      - name: Stop stack
        if: always()
        run: docker compose down -v
