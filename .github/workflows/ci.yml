name: First CI

on:
  push:
    branches:
      - main

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show current directory
        run: pwd
      
      - name: List repository files
        run: ls -la
      
      - name: Print message
        run: echo "Hello from GitHub Actions!"
