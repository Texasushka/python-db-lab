events{}

http{
    log_format upstreamlog
        '$remote_addr - $host "$request"\n'
        'status = $status\n'
        'upstream=$upstream_addr\n'
        'upstream_status=$upstream_status\n'
        'request_time=$request_time\n'
        'upstream_response_time=$upstream_response_time\n';
    
    access_log /var/log/nginx/access.log upstreamlog;


    upstream app_backend{
        server python-db-lab-app-1:8000 max_fails=1 fail_timeout=10s;
        server python-db-lab-app-2:8000 max_fails=1 fail_timeout=10s;
    }

    server{
        listen 80;

        location / {
            proxy_pass http://app:8000; 

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded_Proto %scheme; 
        }
    }
}